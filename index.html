<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>筑梦乡村实践团 - 乡村振兴展示平台</title>
    <style>
        :root {
            --primary: #2d6a4f;
            --primary-light: #40916c;
            --primary-dark: #1b4332;
            --accent: #f0a500;
            --bg: #f5f3ef;
            --card-bg: #ffffff;
            --text: #2d2d2d;
            --text-light: #555;
            --border: #dde1d7;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
            --shadow-hover: 0 6px 24px rgba(0, 0, 0, 0.13);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.25s ease;
            --nav-height: 56px;
            --font-stack: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-stack);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* ==================== 顶部导航 ==================== */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #fff;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 8px 12px;
            flex-wrap: wrap;
            min-height: var(--nav-height);
            align-items: center;
        }
        .nav-item {
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
            white-space: nowrap;
            border: 2px solid transparent;
            background: #f8f9f7;
            color: var(--text-light);
            letter-spacing: 0.3px;
            position: relative;
        }
        .nav-item:hover {
            background: #eef5f0;
            color: var(--primary);
            border-color: #c8dcc8;
        }
        .nav-item.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 3px 10px rgba(45, 106, 79, 0.3);
            transform: translateY(-1px);
        }
        .nav-item .edit-dot {
            display: none;
            position: absolute;
            top: 4px;
            right: 8px;
            width: 7px;
            height: 7px;
            background: #ff4757;
            border-radius: 50%;
        }
        body.edit-mode .nav-item .edit-dot {
            display: block;
        }

        /* ==================== 主容器 ==================== */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }
        .tab-content {
            display: none;
            animation: fadeSlideIn 0.35s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== 首页 ==================== */
        .home-split {
            display: flex;
            gap: 20px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .home-carousel-wrap {
            flex: 1 1 52%;
            min-width: 300px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/10;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .home-carousel-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.5s ease;
        }
        .carousel-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #bbb;
            font-size: 1.1rem;
            background: #fafaf8;
            flex-direction: column;
            gap: 8px;
        }
        .carousel-placeholder svg {
            width: 48px;
            height: 48px;
            opacity: 0.4;
        }
        .carousel-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 5;
        }
        .carousel-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: var(--transition);
        }
        .carousel-dots span.active {
            background: #fff;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.3);
            width: 10px;
            height: 10px;
        }
        .carousel-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.8);
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            z-index: 5;
            transition: var(--transition);
            opacity: 0;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .home-carousel-wrap:hover .carousel-nav-btn {
            opacity: 1;
        }
        .carousel-nav-btn.prev {
            left: 10px;
        }
        .carousel-nav-btn.next {
            right: 10px;
        }
        .carousel-nav-btn:hover {
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        /* 右侧链接区 */
        .home-links-wrap {
            flex: 1 1 40%;
            min-width: 280px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            max-height: 420px;
        }
        .home-links-wrap h3 {
            font-size: 1rem;
            color: var(--primary);
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e8f0e8;
            flex-shrink: 0;
            letter-spacing: 0.5px;
        }
        .links-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 0;
            padding-right: 4px;
        }
        .links-list::-webkit-scrollbar {
            width: 4px;
        }
        .links-list::-webkit-scrollbar-thumb {
            background: #d0d5cc;
            border-radius: 2px;
        }
        .link-item {
            display: block;
            padding: 9px 12px;
            background: #fafcf9;
            border-radius: 6px;
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            transition: var(--transition);
            border-left: 3px solid transparent;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .link-item:hover {
            background: #eef6ef;
            border-left-color: var(--primary-light);
            color: var(--primary-dark);
        }
        .link-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding-top: 10px;
            flex-shrink: 0;
            border-top: 1px solid #eee;
            margin-top: 6px;
            font-size: 0.85rem;
            color: #888;
        }
        .link-pagination button {
            padding: 5px 14px;
            border-radius: 16px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
            color: #555;
        }
        .link-pagination button:hover:not(:disabled) {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .link-pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 成果展示 */
        .achievements-section {
            margin-top: 8px;
        }
        .achievements-section h3 {
            font-size: 1.1rem;
            color: var(--primary-dark);
            margin-bottom: 16px;
            padding-left: 4px;
            letter-spacing: 0.5px;
        }
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
        }
        .achievement-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border);
            text-align: center;
        }
        .achievement-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-3px);
        }
        .achievement-card .img-wrap {
            aspect-ratio: 4/3;
            overflow: hidden;
            background: #f9faf7;
            position: relative;
        }
        .achievement-card .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .achievement-card .img-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #ccc;
            font-size: 0.9rem;
        }
        .achievement-card .card-title {
            padding: 10px 12px;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text);
            letter-spacing: 0.3px;
        }

        /* ==================== 农业 & 渔业 产品行 ==================== */
        .product-row {
            display: flex;
            align-items: stretch;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border);
            overflow: hidden;
            gap: 0;
        }
        .product-row:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-1px);
        }
        .product-row .prod-logo {
            width: 80px;
            min-width: 80px;
            background: #fafcf8;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-right: 1px solid #eee;
        }
        .product-row .prod-logo img {
            width: 56px;
            height: 56px;
            object-fit: contain;
            border-radius: 8px;
        }
        .product-row .prod-logo .logo-placeholder {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            border: 2px dashed #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            font-size: 0.7rem;
            text-align: center;
        }
        .product-row .prod-name {
            width: 120px;
            min-width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            padding: 8px;
            border-right: 1px solid #eee;
            text-align: center;
            letter-spacing: 0.5px;
            color: var(--primary-dark);
        }
        .product-row .prod-desc {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 8px 16px;
            font-size: 0.9rem;
            color: var(--text-light);
            letter-spacing: 0.2px;
        }
        .section-header {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 14px;
            padding-left: 4px;
            letter-spacing: 0.5px;
        }

        /* ==================== 主要企业 ==================== */
        .enterprise-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .enterprise-card:hover {
            box-shadow: var(--shadow-hover);
        }
        .enterprise-card .ent-img-wrap {
            aspect-ratio: 16/8;
            overflow: hidden;
            background: #f9faf7;
            position: relative;
        }
        .enterprise-card .ent-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .enterprise-card .ent-caption {
            padding: 14px 18px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
            letter-spacing: 0.3px;
            color: var(--text);
            background: #fdfefc;
        }

        /* ==================== 空置厂房 ==================== */
        .factory-map-wrap {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            aspect-ratio: 16/6;
            position: relative;
        }
        .factory-map-wrap img,
        .factory-map-wrap iframe {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border: none;
        }
        .factory-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border);
            display: flex;
            gap: 0;
            align-items: stretch;
        }
        .factory-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-1px);
        }
        .factory-card .fc-img {
            width: 160px;
            min-width: 140px;
            aspect-ratio: 4/3;
            overflow: hidden;
            background: #f9faf7;
            border-right: 1px solid #eee;
        }
        .factory-card .fc-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .factory-card .fc-info {
            flex: 1;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .factory-card .fc-info strong {
            color: var(--text);
        }

        /* ==================== 设置页 ==================== */
        .settings-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
            max-width: 500px;
            margin: 0 auto;
            border: 1px solid var(--border);
            text-align: center;
        }
        .settings-card input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            border-radius: 25px;
            border: 2px solid #ddd;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 2px;
            transition: var(--transition);
            outline: none;
        }
        .settings-card input[type="password"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.08);
        }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.4px;
            transition: var(--transition);
            margin: 6px;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 14px rgba(45, 106, 79, 0.3);
        }
        .btn-outline {
            background: #fff;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-outline:hover {
            background: #f0f8f3;
        }
        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-warning {
            background: var(--accent);
            color: #fff;
        }
        .btn-warning:hover {
            background: #d49400;
        }
        .edit-mode-bar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 200;
            background: #1b1b1b;
            color: #fff;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }
        body.edit-mode .edit-mode-bar {
            display: flex;
        }
        .edit-mode-bar button {
            padding: 6px 14px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            background: #fff;
            color: #1b1b1b;
            transition: var(--transition);
        }
        .edit-mode-bar button:hover {
            background: #ff6b6b;
            color: #fff;
        }

        /* ==================== 模态框 ==================== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
            padding: 20px;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-content {
            background: #fff;
            border-radius: var(--radius);
            padding: 24px;
            max-width: 600px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: scaleIn 0.25s ease;
        }
        @keyframes scaleIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        .modal-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: #888;
            z-index: 5;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .modal-close:hover {
            background: #f5f5f5;
            color: #333;
        }
        .modal-content img {
            max-width: 100%;
            max-height: 350px;
            object-fit: contain;
            border-radius: 8px;
            display: block;
            margin: 0 auto 16px;
        }
        .modal-content h3 {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--primary-dark);
        }
        .modal-content p {
            color: var(--text-light);
            line-height: 1.7;
            font-size: 0.95rem;
        }
        .modal-content .detail-row {
            padding: 4px 0;
            font-size: 0.9rem;
            color: #555;
        }
        .modal-content .detail-row strong {
            color: #333;
            display: inline-block;
            width: 50px;
        }

        /* ==================== 编辑模式样式 ==================== */
        body.edit-mode .editable-text {
            border: 2px dashed #ff9f43 !important;
            border-radius: 4px !important;
            padding: 4px 8px !important;
            cursor: text !important;
            background: #fffef9 !important;
            outline: none;
            min-width: 30px;
            transition: border-color 0.2s;
        }
        body.edit-mode .editable-text:focus {
            border-color: #e67e22 !important;
            background: #fffdf5 !important;
            box-shadow: 0 0 0 3px rgba(240, 165, 0, 0.1) !important;
        }
        body.edit-mode .editable-img-wrap {
            position: relative;
            cursor: pointer;
            border: 2px dashed #ff9f43 !important;
            border-radius: 6px !important;
            transition: var(--transition);
        }
        body.edit-mode .editable-img-wrap:hover {
            border-color: #e67e22 !important;
            box-shadow: 0 0 0 4px rgba(240, 165, 0, 0.1) !important;
        }
        body.edit-mode .editable-img-wrap::after {
            content: '✎ 点击编辑图片';
            position: absolute;
            bottom: 6px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            pointer-events: none;
            z-index: 2;
            letter-spacing: 0.5px;
        }
        body.edit-mode .img-placeholder-editable {
            border: 2px dashed #ff9f43 !important;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e67e22 !important;
            font-weight: 600;
            font-size: 0.85rem;
            transition: var(--transition);
            background: #fffef8 !important;
        }
        body.edit-mode .img-placeholder-editable:hover {
            background: #fff8e8 !important;
            border-color: #e67e22 !important;
        }
        .hidden-file-input {
            display: none;
        }

        /* ==================== 响应式 ==================== */
        @media (max-width: 768px) {
            .home-split {
                flex-direction: column;
            }
            .home-carousel-wrap {
                aspect-ratio: 16/9;
            }
            .home-links-wrap {
                max-height: 300px;
            }
            .product-row {
                flex-wrap: nowrap;
                font-size: 0.85rem;
            }
            .product-row .prod-logo {
                width: 60px;
                min-width: 60px;
            }
            .product-row .prod-logo img {
                width: 40px;
                height: 40px;
            }
            .product-row .prod-name {
                width: 80px;
                min-width: 70px;
                font-size: 0.85rem;
            }
            .product-row .prod-desc {
                font-size: 0.78rem;
                padding: 6px 10px;
            }
            .factory-card {
                flex-direction: column;
            }
            .factory-card .fc-img {
                width: 100%;
                min-width: auto;
                aspect-ratio: 16/9;
                border-right: none;
                border-bottom: 1px solid #eee;
            }
            .nav-item {
                padding: 8px 12px;
                font-size: 0.8rem;
                border-radius: 20px;
            }
            .top-nav {
                gap: 3px;
                padding: 6px 4px;
            }
            .achievements-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 12px;
            }
        }
        @media (max-width: 400px) {
            .nav-item {
                padding: 6px 9px;
                font-size: 0.7rem;
                border-radius: 16px;
                letter-spacing: 0;
            }
            .top-nav {
                gap: 2px;
                padding: 4px 2px;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== 顶部导航 ==================== -->
    <nav class="top-nav" id="topNav">

                ],
                ent_title: '🏭 主要企业',
                enterprises: [
                    { img: '', caption: '企业一：XXX农业科技有限公司' },
                    { img: '', caption: '企业二：XXX渔业养殖基地' },
                ],
                factory_map_type: 'image', // 'image' | 'iframe'
                factory_map_data: '', // base64 或 iframe src
                factories: [
                    { img: '', desc: '空置厂房A区', location: '茂名市XX镇XX路', phone: '138xxxx1234',
                    area: '约800㎡' },
                    { img: '', desc: '空置厂房B区', location: '茂名市XX街道XX号', phone: '139xxxx5678',
                    area: '约1200㎡' },
                    { img: '', desc: '空置厂房C区', location: '茂名市XX工业园', phone: '136xxxx9012', area: '约600㎡' },
                    { img: '', desc: '空置厂房D区', location: '茂名市XX开发区', phone: '135xxxx3456',
                    area: '约1500㎡' },
                    { img: '', desc: '空置厂房E区', location: '茂名市XX镇中心', phone: '137xxxx7890',
                    area: '约1000㎡' },
                    { img: '', desc: '空置厂房F区', location: '茂名市XX路东段', phone: '133xxxx2345', area: '约900㎡' },
                    { img: '', desc: '空置厂房G区', location: '茂名市XX片区', phone: '132xxxx6789', area: '约700㎡' },
                ],
            };

            // ==================== 状态管理 ====================
            let appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
            let currentTab = 'home';
            let isEditMode = false;
            let carouselIndex = 0;
            let carouselTimer = null;
            let carouselPaused = false;
            let linksPage = 0;
            const LINKS_PER_PAGE = 5;
            let pendingImageTarget = null; // 用于编辑模式下图片更换的目标标识

            // ==================== 初始化 ====================
            function loadData() {
                try {
                    const saved = localStorage.getItem('zmxc_app_data');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        // 深度合并，保留默认结构
                        appData = deepMerge(JSON.parse(JSON.stringify(DEFAULT_DATA)), parsed);
                    }
                } catch (e) {
                    console.warn('数据加载失败，使用默认数据', e);
                    appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
                }
                // 确保密码字段存在
                if (!appData.admin_password) appData.admin_password = DEFAULT_PASSWORD;
            }

            function saveData() {
                try {
                    const jsonStr = JSON.stringify(appData);
                    if (jsonStr.length > 4.5 * 1024 * 1024) {
                        alert('⚠️ 存储空间接近上限（约5MB），请适当压缩图片后再保存。');
                    }
                    localStorage.setItem('zmxc_app_data', jsonStr);
                } catch (e) {
                    if (e.name === 'QuotaExceededError') {
                        alert('❌ 存储空间已满！请删除一些图片或使用更小的图片文件。');
                    } else {
                        console.error('保存失败', e);
                    }
                }
            }

            function deepMerge(target, source) {
                const result = JSON.parse(JSON.stringify(target));
                for (const key in source) {
                    if (source.hasOwnProperty(key)) {
                        if (typeof source[key] === 'object' && source[key] !== null && !Array.isArray(source[
                                key]) && typeof result[key] === 'object' && result[key] !== null && !Array.isArray(
                                result[key])) {
                            result[key] = deepMerge(result[key], source[key]);
                        } else {
                            result[key] = source[key];
                        }
                    }
                }
                return result;
            }

            // ==================== DOM引用 ====================
            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => document.querySelectorAll(sel);

            const mainContainer = $('#mainContainer');
            const modalOverlay = $('#modalOverlay');
            const modalBody = $('#modalBody');
            const modalClose = $('#modalClose');
            const hiddenFileInput = $('#hiddenFileInput');
            const editModeBar = $('#editModeBar');

            // ==================== 导航切换 ====================
            function switchTab(tabName) {
                currentTab = tabName;
                // 更新导航高亮
                $$('.nav-item').forEach(el => el.classList.remove('active'));
                const navItem = document.querySelector(`.nav-item[data-tab="${tabName}"]`);
                if (navItem) navItem.classList.add('active');
                // 切换内容
                $$('.tab-content').forEach(el => el.classList.remove('active'));
                const tabContent = document.getElementById(`tab-${tabName}`);
                if (tabContent) tabContent.classList.add('active');
                // 停止轮播（如果离开首页）
                if (tabName !== 'home') stopCarousel();
                else startCarousel();
                // 渲染对应内容
                renderTabContent(tabName);
                // 滚动到顶部
                window.scrollTo({ top: 0, behavior: 'smooth' });
                mainContainer.scrollTop = 0;
            }

            $$('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    const tab = this.getAttribute('data-tab');
                    if (tab) switchTab(tab);
                });
            });

            // ==================== 渲染函数 ====================
            function renderTabContent(tabName) {
                switch (tabName) {
                    case 'home':
                        renderHome();
                        break;
                    case 'agriculture':
                        renderAgriculture();
                        break;
                    case 'fishery':
                        renderFishery();
                        break;
                    case 'enterprises':
                        renderEnterprises();
                        break;
                    case 'factories':
                        renderFactories();
                        break;
                    case 'settings':
                        renderSettings();
                        break;
                }
                refreshEditModeStyles();
            }

            function refreshEditModeStyles() {
                // 更新所有editable-text
                $$('.editable-text').forEach(el => {
                    if (isEditMode) {
                        el.setAttribute('contenteditable', 'true');
                        el.style.border = '2px dashed #ff9f43';
                        el.style.borderRadius = '4px';
                        el.style.padding = '4px 8px';
                        el.style.cursor = 'text';
                        el.style.background = '#fffef9';
                    } else {
                        el.setAttribute('contenteditable', 'false');
                        el.style.border = '';
                        el.style.borderRadius = '';
                        el.style.padding = '';
                        el.style.cursor = '';
                        el.style.background = '';
                    }
                });
                // 更新图片包裹层
                $$('.editable-img-wrap').forEach(el => {
                    if (isEditMode) {
                        el.style.border = '2px dashed #ff9f43';
                        el.style.borderRadius = '6px';
                        el.style.cursor = 'pointer';
                    } else {
                        el.style.border = '';
                        el.style.borderRadius = '';
                        el.style.cursor = '';
                    }
                });
                $$('.img-placeholder-editable').forEach(el => {
                    if (isEditMode) {
                        el.style.border = '2px dashed #ff9f43';
                        el.style.cursor = 'pointer';
                        el.style.color = '#e67e22';
                        el.style.fontWeight = '600';
                        el.style.background = '#fffef8';
                    } else {
                        el.style.border = '';
                        el.style.cursor = '';
                        el.style.color = '';
                        el.style.fontWeight = '';
                        el.style.background = '';
                    }
                });
                if (isEditMode) {
                    document.body.classList.add('edit-mode');
                } else {
                    document.body.classList.remove('edit-mode');
                }
                // 更新设置页按钮
                const btnEditContent = $('#btnEditContent');
                const btnExitEdit = $('#btnExitEdit');
                if (btnEditContent && btnExitEdit) {
                    if (isEditMode) {
                        btnEditContent.style.display = 'none';
                        btnExitEdit.style.display = 'inline-block';
                    } else {
                        btnEditContent.style.display = 'inline-block';
                        btnExitEdit.style.display = 'none';
                    }
                }
                if (editModeBar) {
                    editModeBar.style.display = isEditMode ? 'flex' : 'none';
                }
            }

            // ==================== 首页渲染 ====================
            function renderHome() {
                // 轮播
                renderCarousel();
                // 链接
                renderLinks();
                // 成果
                renderAchievements();
                // 更新editable-text
                const linksTitleEl = document.querySelector('#homeLinksWrap .editable-text');
                if (linksTitleEl) linksTitleEl.textContent = appData.links_title || DEFAULT_DATA.links_title;
                const achTitleEl = document.querySelector('#tab-home .achievements-section .editable-text');
                if (achTitleEl) achTitleEl.textContent = appData.achievements_title || DEFAULT_DATA
                .achievements_title;
            }

            function renderCarousel() {
                const wrap = $('#carouselWrap');
                const img = $('#carouselImg');
                const placeholder = $('#carouselPlaceholder');
                const dotsContainer = $('#carouselDots');
                const images = appData.carousel_images || [];

                if (images.length === 0) {
                    img.style.display = 'none';
                    if (placeholder) placeholder.style.display = 'flex';
                    if (dotsContainer) dotsContainer.innerHTML = '';
                    carouselIndex = 0;
                } else {
                    if (placeholder) placeholder.style.display = 'none';
                    img.style.display = 'block';
                    if (carouselIndex >= images.length) carouselIndex = 0;
                    img.src = images[carouselIndex] || '';
                    // 渲染圆点
                    if (dotsContainer) {
                        dotsContainer.innerHTML = images.map((_, i) =>
                            `<span class="${i === carouselIndex ? 'active' : ''}" data-index="${i}"></span>`
                        ).join('');
                        dotsContainer.querySelectorAll('span').forEach(dot => {
                            dot.addEventListener('click', function(e) {
                                e.stopPropagation();
                                const idx = parseInt(this.getAttribute('data-index'));
                                goToCarouselSlide(idx);
                            });
                        });
                    }
                }
                // 编辑模式下点击轮播区
                wrap.onclick = function(e) {
                    if (isEditMode && !e.target.closest('.carousel-nav-btn') && !e.target.closest(
                            '.carousel-dots')) {
                        handleImageEdit('carousel_images', carouselIndex, '轮播图片');
                        return;
                    }
                    if (!isEditMode && appData.carousel_images && appData.carousel_images.length > 0) {
                        openImageModal(appData.carousel_images[carouselIndex], '轮播图片');
                    }
                };
                startCarousel();
            }

            function goToCarouselSlide(idx) {
                const images = appData.carousel_images || [];
                if (images.length === 0) return;
                carouselIndex = Math.max(0, Math.min(idx, images.length - 1));
                const img = $('#carouselImg');
                if (img) img.src = images[carouselIndex] || '';
                const dots = $$('#carouselDots span');
                dots.forEach((d, i) => d.classList.toggle('active', i === carouselIndex));
            }

            function startCarousel() {
                stopCarousel();
                const images = appData.carousel_images || [];
                if (images.length <= 1) return;
                if (currentTab !== 'home') return;
                carouselTimer = setInterval(() => {
                    if (!carouselPaused && currentTab === 'home') {
                        const imgs = appData.carousel_images || [];
                        if (imgs.length > 1) {
                            carouselIndex = (carouselIndex + 1) % imgs.length;
                            const img = $('#carouselImg');
                            if (img) img.src = imgs[carouselIndex] || '';
                            const dots = $$('#carouselDots span');
                            dots.forEach((d, i) => d.classList.toggle('active', i === carouselIndex));
                        }
                    }
                }, 2000);
            }

            function stopCarousel() {
                if (carouselTimer) {
                    clearInterval(carouselTimer);
                    carouselTimer = null;
                }
            }

            $('#carouselPrev')?.addEventListener('click', function(e) {
                e.stopPropagation();
                const images = appData.carousel_images || [];
                if (images.length <= 1) return;
                carouselIndex = (carouselIndex - 1 + images.length) % images.length;
                goToCarouselSlide(carouselIndex);
            });
            $('#carouselNext')?.addEventListener('click', function(e) {
                e.stopPropagation();
                const images = appData.carousel_images || [];
                if (images.length <= 1) return;
                carouselIndex = (carouselIndex + 1) % images.length;
                goToCarouselSlide(carouselIndex);
            });

            function renderLinks() {
                const listEl = $('#linksList');
                const pagEl = $('#linkPagination');
                const links = appData.links || [];
                const totalPages = Math.max(1, Math.ceil(links.length / LINKS_PER_PAGE));
                if (linksPage >= totalPages) linksPage = totalPages - 1;
                if (linksPage < 0) linksPage = 0;
                const start = linksPage * LINKS_PER_PAGE;
                const pageLinks = links.slice(start, start + LINKS_PER_PAGE);

                if (listEl) {
                    if (pageLinks.length === 0) {
                        listEl.innerHTML =
                            '<div style="color:#ccc;text-align:center;padding:20px;">暂无链接，请在编辑模式下添加</div>';
                    } else {
                        listEl.innerHTML = pageLinks.map((l, i) =>
                            `<a class="link-item" href="${escapeHtml(l.url || '#')}" target="_blank" rel="noopener" data-link-index="${start + i}">${escapeHtml(l.title || '未命名链接')}</a>`
                        ).join('');
                        // 编辑模式下拦截点击
                        if (isEditMode) {
                            listEl.querySelectorAll('.link-item').forEach(a => {
                                a.addEventListener('click', function(e) {
                                    e.preventDefault();
                                    const idx = parseInt(this.getAttribute(
                                        'data-link-index'));
                                    editLinkItem(idx);
                                });
                            });
                        }
                    }
                }
                if (pagEl) {
                    pagEl.innerHTML = `
                        <button id="linkPrevBtn" ${linksPage === 0 ? 'disabled' : ''}>上一页</button>
                        <span>${linksPage + 1} / ${totalPages}</span>
                        <button id="linkNextBtn" ${linksPage >= totalPages - 1 ? 'disabled' : ''}>下一页</button>
                    `;
                    $('#linkPrevBtn')?.addEventListener('click', () => {
                        if (linksPage > 0) { linksPage--;
                            renderLinks(); }
                    });
                    $('#linkNextBtn')?.addEventListener('click', () => {
                        const tp = Math.max(1, Math.ceil((appData.links || []).length /
                            LINKS_PER_PAGE));
                        if (linksPage < tp - 1) { linksPage++;
                            renderLinks(); }
                    });
                }
            }

            function editLinkItem(index) {
                const link = (appData.links || [])[index];
                if (!link) return;
                const newTitle = prompt('编辑链接标题：', link.title || '');
                if (newTitle === null) return;
                const newUrl = prompt('编辑链接URL：', link.url || '');
                if (newUrl === null) return;
                appData.links[index].title = newTitle;
                appData.links[index].url = newUrl;
                saveData();
                renderLinks();
            }

            function renderAchievements() {
                const grid = $('#achievementsGrid');
                if (!grid) return;
                const achievements = appData.achievements || [];
                grid.innerHTML = achievements.map((a, i) => `
                    <div class="achievement-card" data-ach-index="${i}">
                        <div class="img-wrap editable-img-wrap">
                            ${a.img ? `<img src="${a.img}" alt="${escapeHtml(a.title)}">` : `<div class="img-placeholder img-placeholder-editable" style="height:100%;">📷 点击插入图片</div>`}
                        </div>
                        <div class="card-title editable-text" data-key="achievements[${i}].title">${escapeHtml(a.title || '')}</div>
                    </div>
                `).join('');
                // 绑定事件
                grid.querySelectorAll('.achievement-card').forEach(card => {
                    const idx = parseInt(card.getAttribute('data-ach-index'));
                    card.addEventListener('click', function(e) {
                        if (isEditMode) {
                            const target = e.target;
                            if (target.closest('.img-wrap')) {
                                handleImageEdit(`achievements[${idx}].img`, idx, '成果图片');
                                return;
                            }
                            if (target.closest('.card-title')) return; // contenteditable处理
                            return;
                        }
                        // 非编辑模式：放大查看
                        const ach = (appData.achievements || [])[idx];
                        if (ach) {
                            openAchievementModal(ach);
                        }
                    });
                });
            }

            function openAchievementModal(ach) {
                const body = modalBody;
                body.innerHTML = `
                    ${ach.img ? `<img src="${ach.img}" alt="${escapeHtml(ach.title)}" style="max-width:100%;max-height:350px;object-fit:contain;border-radius:8px;display:block;margin:0 auto 16px;">` : '<div style="text-align:center;color:#ccc;padding:40px;">暂无图片</div>'}
                    <h3>${escapeHtml(ach.title || '')}</h3>
                    <p>${escapeHtml(ach.desc || '')}</p>
                `;
                openModal();
            }

            // ==================== 农业渲染 ====================
            function renderAgriculture() {
                const container = $('#agriProducts');
                if (!container) return;
                const products = appData.agri_products || [];
                container.innerHTML = products.map((p, i) => `
                    <div class="product-row" data-agri-index="${i}">
                        <div class="prod-logo editable-img-wrap">
                            ${p.logo ? `<img src="${p.logo}" alt="${escapeHtml(p.name)}">` : `<div class="logo-placeholder img-placeholder-editable">logo</div>`}
                        </div>
                        <div class="prod-name editable-text" data-key="agri_products[${i}].name">${escapeHtml(p.name)}</div>
                        <div class="prod-desc editable-text" data-key="agri_products[${i}].shortDesc">${escapeHtml(p.shortDesc || '')}</div>
                    </div>
                `).join('');
                container.querySelectorAll('.product-row').forEach(row => {
                    const idx = parseInt(row.getAttribute('data-agri-index'));
                    row.addEventListener('click', function(e) {
                        if (isEditMode) {
                            if (e.target.closest('.prod-logo')) {
                                handleImageEdit(`agri_products[${idx}].logo`, idx,
                                    '农产品Logo');
                                return;
                            }
                            if (e.target.closest('.editable-text')) return;
                            return;
                        }
                        const prod = (appData.agri_products || [])[idx];
                        if (prod) openProductModal(prod);
                    });
                });
            }

            function openProductModal(prod) {
                const body = modalBody;
                body.innerHTML = `
                    ${prod.logo ? `<img src="${prod.logo}" alt="${escapeHtml(prod.name)}" style="max-width:180px;max-height:180px;object-fit:contain;border-radius:12px;display:block;margin:0 auto 16px;">` : '<div style="text-align:center;color:#ccc;padding:30px;">暂无Logo</div>'}
                    <h3>${escapeHtml(prod.name || '')}</h3>
                    <p>${escapeHtml(prod.fullDesc || prod.shortDesc || '')}</p>
                `;
                openModal();
            }

            // ==================== 渔业渲染 ====================
            function renderFishery() {
                const container = $('#fishProducts');
                if (!container) return;
                const products = appData.fish_products || [];
                container.innerHTML = products.map((p, i) => `
                    <div class="product-row" data-fish-index="${i}">
                        <div class="prod-logo editable-img-wrap">
                            ${p.logo ? `<img src="${p.logo}" alt="${escapeHtml(p.name)}">` : `<div class="logo-placeholder img-placeholder-editable">logo</div>`}
                        </div>
                        <div class="prod-name editable-text" data-key="fish_products[${i}].name">${escapeHtml(p.name)}</div>
                        <div class="prod-desc editable-text" data-key="fish_products[${i}].shortDesc">${escapeHtml(p.shortDesc || '')}</div>
                    </div>
                `).join('');
                container.querySelectorAll('.product-row').forEach(row => {
                    const idx = parseInt(row.getAttribute('data-fish-index'));
                    row.addEventListener('click', function(e) {
                        if (isEditMode) {
                            if (e.target.closest('.prod-logo')) {
                                handleImageEdit(`fish_products[${idx}].logo`, idx,
                                    '渔业产品Logo');
                                return;
                            }
                            if (e.target.closest('.editable-text')) return;
                            return;
                        }
                        const prod = (appData.fish_products || [])[idx];
                        if (prod) openProductModal(prod);
                    });
                });
            }

            // ==================== 主要企业渲染 ====================
            function renderEnterprises() {
                const container = $('#enterprisesList');
                if (!container) return;
                const enterprises = appData.enterprises || [];
                container.innerHTML = enterprises.map((ent, i) => `
                    <div class="enterprise-card" data-ent-index="${i}">
                        <div class="ent-img-wrap editable-img-wrap">
                            ${ent.img ? `<img src="${ent.img}" alt="${escapeHtml(ent.caption)}">` : `<div class="img-placeholder img-placeholder-editable" style="height:100%;">📷 点击插入企业图片</div>`}
                        </div>
                        <div class="ent-caption editable-text" data-key="enterprises[${i}].caption">${escapeHtml(ent.caption || '')}</div>
                    </div>
                `).join('');
                container.querySelectorAll('.enterprise-card').forEach(card => {
                    const idx = parseInt(card.getAttribute('data-ent-index'));
                    card.addEventListener('click', function(e) {
                        if (isEditMode) {
                            if (e.target.closest('.ent-img-wrap')) {
                                handleImageEdit(`enterprises[${idx}].img`, idx,
                                    '企业图片');
                                return;
                            }
                            if (e.target.closest('.ent-caption')) return;
                            return;
                        }
                        const ent = (appData.enterprises || [])[idx];
                        if (ent && ent.img) {
                            openImageModal(ent.img, ent.caption || '企业图片');
                        }
                    });
                });
            }

            // ==================== 空置厂房渲染 ====================
            function renderFactories() {
                // 地图
                const mapWrap = $('#factoryMapWrap');
                const mapImg = $('#factoryMapImg');
                const mapIframe = $('#factoryMapIframe');
                const mapPlaceholder = $('#mapPlaceholder');
                if (mapWrap && mapImg && mapIframe && mapPlaceholder) {
                    const mapType = appData.factory_map_type || 'image';
                    const mapData = appData.factory_map_data || '';
                    mapImg.style.display = 'none';
                    mapIframe.style.display = 'none';
                    mapPlaceholder.style.display = 'flex';
                    if (mapType === 'image' && mapData) {
                        mapImg.src = mapData;
                        mapImg.style.display = 'block';
                        mapPlaceholder.style.display = 'none';
                    } else if (mapType === 'iframe' && mapData) {
                        mapIframe.src = mapData;
                        mapIframe.style.display = 'block';
                        mapPlaceholder.style.display = 'none';
                    }
                    mapWrap.onclick = function(e) {
                        if (isEditMode) {
                            handleMapEdit();
                            return;
                        }
                        if (mapType === 'image' && mapData) {
                            openImageModal(mapData, '厂房地图');
                        }
                    };
                }
                // 厂房列表
                const container = $('#factoriesList');
                if (!container) return;
                const factories = appData.factories || [];
                container.innerHTML = factories.map((f, i) => `
                    <div class="factory-card" data-factory-index="${i}">
                        <div class="fc-img editable-img-wrap">
                            ${f.img ? `<img src="${f.img}" alt="${escapeHtml(f.desc)}">` : `<div class="img-placeholder img-placeholder-editable" style="height:100%;">📷 厂房图片</div>`}
                        </div>
                        <div class="fc-info">
                            <span class="editable-text" data-key="factories[${i}].desc"><strong>${escapeHtml(f.desc || '')}</strong></span>
                            <span style="font-size:0.8rem;color:#999;">地点：<span class="editable-text" data-key="factories[${i}].location">${escapeHtml(f.location || '')}</span></span>
                            <span style="font-size:0.8rem;color:#999;">电话：<span class="editable-text" data-key="factories[${i}].phone">${escapeHtml(f.phone || '')}</span></span>
                        </div>
                    </div>
                `).join('');
                container.querySelectorAll('.factory-card').forEach(card => {
                    const idx = parseInt(card.getAttribute('data-factory-index'));
                    card.addEventListener('click', function(e) {
                        if (isEditMode) {
                            if (e.target.closest('.fc-img')) {
                                handleImageEdit(`factories[${idx}].img`, idx,
                                    '厂房图片');
                                return;
                            }
                            if (e.target.closest('.editable-text')) return;
                            return;
                        }
                        const fact = (appData.factories || [])[idx];
                        if (fact) openFactoryModal(fact);
                    });
                });
            }

            function openFactoryModal(fact) {
                const body = modalBody;
                body.innerHTML = `
                    ${fact.img ? `<img src="${fact.img}" alt="${escapeHtml(fact.desc)}" style="max-width:100%;max-height:300px;object-fit:contain;border-radius:8px;display:block;margin:0 auto 16px;">` : '<div style="text-align:center;color:#ccc;padding:30px;">暂无图片</div>'}
                    <h3>${escapeHtml(fact.desc || '')}</h3>
                    <div class="detail-row"><strong>地点：</strong>${escapeHtml(fact.location || '')}</div>
                    <div class="detail-row"><strong>电话：</strong>${escapeHtml(fact.phone || '')}</div>
                    <div class="detail-row"><strong>面积：</strong>${escapeHtml(fact.area || '')}</div>
                `;
                openModal();
            }

            function handleMapEdit() {
                const choice = confirm(
                    '编辑地图：\n点击"确定"上传地图图片\n点击"取消"输入地图iframe嵌入链接（如百度地图分享链接）');
                if (choice) {
                    // 上传图片
                    pendingImageTarget = 'factory_map_image';
                    hiddenFileInput.click();
                } else {
                    const url = prompt('请输入地图iframe的src链接（或粘贴完整iframe代码）：',
                        appData.factory_map_type === 'iframe' ? appData.factory_map_data : '');
                    if (url === null) return;
                    let src = url.trim();
                    // 尝试从iframe代码中提取src
                    const iframeMatch = src.match(/<iframe[^>]+src=["']([^"']+)["']/i);
                    if (iframeMatch) src = iframeMatch[1];
                    if (src) {
                        appData.factory_map_type = 'iframe';
                        appData.factory_map_data = src;
                    } else {
                        appData.factory_map_type = 'image';
                        appData.factory_map_data = '';
                    }
                    saveData();
                    renderFactories();
                }
            }

            // ==================== 设置渲染 ====================
            function renderSettings() {
                const pwdInput = $('#pwdInput');
                const pwdError = $('#pwdError');
                const settingsPanel = $('#settingsPanel');
                if (pwdInput) pwdInput.value = '';
                if (pwdError) pwdError.style.display = 'none';
                if (settingsPanel) settingsPanel.style.display = 'none';
                const btnEditContent = $('#btnEditContent');
                const btnExitEdit = $('#btnExitEdit');
                if (btnEditContent) btnEditContent.style.display = isEditMode ? 'none' : 'inline-block';
                if (btnExitEdit) btnExitEdit.style.display = isEditMode ? 'inline-block' : 'none';
            }

            $('#pwdSubmit')?.addEventListener('click', function() {
                const input = $('#pwdInput').value.trim();
                const storedPwd = appData.admin_password || DEFAULT_PASSWORD;
                if (input === storedPwd) {
                    $('#pwdError').style.display = 'none';
                    $('#settingsPanel').style.display = 'block';
                    $('#pwdInput').value = '';
                } else {
                    $('#pwdError').style.display = 'block';
                }
            });
            $('#pwdInput')?.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') $('#pwdSubmit')?.click();
            });

            $('#btnChangePwd')?.addEventListener('click', function() {
                const oldPwd = prompt('请输入当前密码：');
                if (oldPwd === null) return;
                if (oldPwd !== (appData.admin_password || DEFAULT_PASSWORD)) {
                    alert('当前密码错误！');
                    return;
                }
                const newPwd = prompt('请输入新密码：');
                if (newPwd === null || newPwd.trim() === '') {
                    alert('密码不能为空！');
                    return;
                }
                const confirmPwd = prompt('请再次输入新密码：');
                if (confirmPwd !== newPwd) {
                    alert('两次输入的密码不一致！');
                    return;
                }
                appData.admin_password = newPwd.trim();
                saveData();
                alert('✅ 密码修改成功！新密码为：' + appData.admin_password);
            });

            $('#btnEditContent')?.addEventListener('click', function() {
                isEditMode = true;
                refreshEditModeStyles();
                renderTabContent(currentTab);
                alert('✅ 编辑模式已开启！\n\n• 文本区域可直接点击编辑\n• 图片区域点击可插入/更换/删除\n• 编辑完成后请点击"退出编辑模式"');
            });
            $('#btnExitEdit')?.addEventListener('click', exitEditMode);
            $('#btnExitEditBar')?.addEventListener('click', exitEditMode);

            function exitEditMode() {
                // 保存所有contenteditable的更改
                saveAllEditableChanges();
                isEditMode = false;
                refreshEditModeStyles();
                saveData();
                renderTabContent(currentTab);
            }

            function saveAllEditableChanges() {
                $$('.editable-text').forEach(el => {
                    const key = el.getAttribute('data-key');
                    if (!key) return;
                    const value = el.textContent.trim();
                    setNestedValue(appData, key, value);
                });
            }

            function setNestedValue(obj, path, value) {
                const keys = path.replace(/\[(\d+)\]/g, '.$1').split('.');
                let current = obj;
                for (let i = 0; i < keys.length - 1; i++) {
                    const k = keys[i];
                    if (!current[k]) current[k] = {};
                    current = current[k];
                }
                current[keys[keys.length - 1]] = value;
            }

            function getNestedValue(obj, path) {
                const keys = path.replace(/\[(\d+)\]/g, '.$1').split('.');
                let current = obj;
                for (const k of keys) {
                    if (current === undefined || current === null) return undefined;
                    current = current[k];
                }
                return current;
            }

            // ==================== 图片编辑处理 ====================
            function handleImageEdit(targetPath, index, label) {
                const currentValue = getNestedValue(appData, targetPath);
                if (currentValue && typeof currentValue === 'string' && currentValue.length > 100) {
                    // 有图片
                    const action = confirm(`当前有"${label}"图片。\n点击"确定"更换图片\n点击"取消"删除图片`);
                    if (action) {
                        pendingImageTarget = targetPath;
                        hiddenFileInput.click();
                    } else {
                        setNestedValue(appData, targetPath, '');
                        saveData();
                        renderTabContent(currentTab);
                    }
                } else {
                    // 无图片
                    const action = confirm(`当前无"${label}"图片。\n点击"确定"插入图片\n点击"取消"取消操作`);
                    if (action) {
                        pendingImageTarget = targetPath;
                        hiddenFileInput.click();
                    }
                }
            }

            hiddenFileInput.addEventListener('change', function() {
                const file = this.files[0];
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    alert('请选择图片文件！');
                    this.value = '';
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64 = e.target.result;
                    if (pendingImageTarget === 'factory_map_image') {
                        appData.factory_map_type = 'image';
                        appData.factory_map_data = base64;
                    } else if (pendingImageTarget) {
                        setNestedValue(appData, pendingImageTarget, base64);
                    }
                    pendingImageTarget = null;
                    saveData();
                    renderTabContent(currentTab);
                };
                reader.onerror = function() {
                    alert('图片读取失败，请重试。');
                    pendingImageTarget = null;
                };
                reader.readAsDataURL(file);
                this.value = '';
            });

            // ==================== 模态框 ====================
            function openModal() {
                modalOverlay.style.display = 'flex';
                document.body.style.overflow = 'hidden';
                if (currentTab === 'home') carouselPaused = true;
            }

            function closeModal() {
                modalOverlay.style.display = 'none';
                document.body.style.overflow = '';
                carouselPaused = false;
                modalBody.innerHTML = '';
            }

            function openImageModal(imgSrc, title) {
                const body = modalBody;
                body.innerHTML = `
                    <img src="${imgSrc}" alt="${escapeHtml(title || '')}" style="max-width:100%;max-height:70vh;object-fit:contain;border-radius:8px;display:block;margin:0 auto;">
                    ${title ? `<p style="text-align:center;margin-top:12px;color:#888;">${escapeHtml(title)}</p>` : ''}
                `;
                openModal();
            }

            modalClose?.addEventListener('click', closeModal);
            modalOverlay?.addEventListener('click', function(e) {
                if (e.target === modalOverlay) closeModal();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modalOverlay.style.display === 'flex') {
                    closeModal();
                }
            });

            // ==================== 全局编辑模式下的文本保存 ====================
            document.addEventListener('blur', function(e) {
                if (isEditMode && e.target.classList.contains('editable-text')) {
                    const key = e.target.getAttribute('data-key');
                    if (key) {
                        const value = e.target.textContent.trim();
                        setNestedValue(appData, key, value);
                        saveData();
                    }
                }
            }, true);

            // 定期自动保存（编辑模式下）
            setInterval(() => {
                if (isEditMode) {
                    saveAllEditableChanges();
                    saveData();
                }
            }, 5000);

            // ==================== 工具函数 ====================
            function escapeHtml(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ==================== 页面加载初始化 ====================
            function init() {
                loadData();
                switchTab('home');
                renderTabContent('home');
                // 初始刷新编辑样式
                refreshEditModeStyles();
            }

            // ==================== 窗口关闭前保存 ====================
            window.addEventListener('beforeunload', () => {
                if (isEditMode) {
                    saveAllEditableChanges();
                    saveData();
                }
            });

            // ==================== 启动 ====================
            init();

            console.log('🌾 筑梦乡村实践团 - 乡村振兴展示平台已就绪');
            console.log('   - 顶部6个导航标签可切换');
            console.log('   - 首页轮播2秒自动切换');
            console.log('   - 点击设置→输入密码(' + DEFAULT_PASSWORD +
                ')→编辑内容 可进入编辑模式');
            console.log('   - 编辑模式下文本可直接编辑，图片可点击更换');
            console.log('   - 所有数据自动保存到浏览器本地存储');
        })();
    </script>
</body>
</html>
